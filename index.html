    <!--
      Theme bootstrap. This runs before the first paint so a returning visitor
      never sees a flash of the wrong theme while the bundle loads.
    -->
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('dcd-theme')
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches
          document.documentElement.dataset.theme = stored || (prefersLight ? 'light' : 'dark')
          if (document.documentElement.dataset.theme === 'light') {
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#f8f6f1')
          }
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>

    <!--
      GitHub Pages has no server-side rewrite, so 404.html stashes the requested
      path in sessionStorage and bounces here. Restore it before Vue Router boots
      and a deep link like /resume behaves like a normal URL.
    -->
    <script>
      ;(function () {
        var redirect = sessionStorage.getItem('spa-redirect')
        if (redirect) {
          sessionStorage.removeItem('spa-redirect')
          if (redirect !== location.pathname + location.search + location.hash) {
            history.replaceState(null, '', redirect)
          }
        }
      })()
    </script>
