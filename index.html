<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!--
      %SITE_*% placeholders are substituted at build time by the `html-identity`
      plugin in vite.config.js, which reads src/content/site.js. Edit the copy
      there, not here — an unknown token fails the build rather than shipping.
    -->
    <title>%SITE_NAME%, %SITE_ROLE%</title>
    <meta name="description" content="%SITE_DESCRIPTION%" />
    <meta name="author" content="%SITE_NAME%" />
    <link rel="canonical" href="%SITE_URL%/" />
    <meta name="theme-color" content="#04070d" />

    <!-- Icons -->
    <link rel="icon" href="/ico-file.ico" sizes="any" />
    <link rel="icon" href="/Logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/WebsiteProfilePic.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="%SITE_NAME%" />
    <meta property="og:title" content="%SITE_NAME%, %SITE_ROLE%" />
    <meta property="og:description" content="%SITE_SHARE_DESCRIPTION%" />
    <meta property="og:url" content="%SITE_URL%/" />
    <meta property="og:image" content="%SITE_URL%/WebsiteProfilePic.png" />
    <meta property="og:image:alt" content="Portrait of %SITE_NAME%" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%SITE_NAME%, %SITE_ROLE%" />
    <meta name="twitter:description" content="%SITE_SHARE_DESCRIPTION_SHORT%" />
    <meta name="twitter:image" content="%SITE_URL%/WebsiteProfilePic.png" />

    <!--
      Theme bootstrap. This runs before the first paint so a returning visitor
      never sees a flash of the wrong theme while the bundle loads.
    -->
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('dcd-theme')
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches
          document.documentElement.dataset.theme = stored || (prefersLight ? 'light' : 'dark')
          if (document.documentElement.dataset.theme === 'light') {
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#f8f6f1')
          }
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>

    <!--
      GitHub Pages has no server-side rewrite, so 404.html stashes the requested
      path in sessionStorage and bounces here. Restore it before Vue Router boots
      and a deep link like /resume behaves like a normal URL.
    -->
    <script>
      ;(function () {
        var redirect = sessionStorage.getItem('spa-redirect')
        if (redirect) {
          sessionStorage.removeItem('spa-redirect')
          if (redirect !== location.pathname + location.search + location.hash) {
            history.replaceState(null, '', redirect)
          }
        }
      })()
    </script>

    <!-- Structured data: helps search results show the right thing. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "%SITE_NAME%",
        "url": "%SITE_URL%/",
        "image": "%SITE_URL%/WebsiteProfilePic.png",
        "jobTitle": "%SITE_ROLE%",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Miami",
          "addressRegion": "FL",
          "addressCountry": "US"
        },
        "alumniOf": {
          "@type": "CollegeOrUniversity",
          "name": "University of Miami"
        },
        "knowsAbout": ["JavaScript", "Vue.js", "Node.js", "MongoDB", "Mongoose.js", "Open Source"],
        "sameAs": [
          "https://github.com/IslandRhythms",
          "https://theislandrhythm.itch.io",
          "https://steamcommunity.com/profiles/76561198216752133"
        ]
      }
    </script>
  </head>

  <body>
    <div id="app"></div>
    <noscript>
      <div style="padding: 4rem 1.5rem; text-align: center; font-family: system-ui, sans-serif">
        <h1>%SITE_NAME%, %SITE_ROLE%</h1>
        <p>
          This portfolio needs JavaScript to run. In the meantime you can browse my work on
          <a href="https://github.com/IslandRhythms">GitHub</a>.
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
