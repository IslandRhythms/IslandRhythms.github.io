name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  # Lets you re-deploy from the Actions tab without pushing a commit.
  workflow_dispatch:

# Allow GITHUB_TOKEN to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; queue the newest and let it win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
