name: CI

on:
  pull_request:
    # `master` catches feature work; `production` catches the release PR, which
    # would otherwise merge and deploy without ever being checked.
    branches: [master, production]
  workflow_dispatch:

jobs:
  verify:
    name: Lint, format & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Check formatting
        run: npm run format:check

      - name: Build
        run: npm run build

      # A regression here usually means an accidental dependency import.
      - name: Report bundle size
        run: |
          echo "### Bundle contents" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          du -bh dist/assets/* | sort -k2 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Total: $(du -sh dist | cut -f1)" >> "$GITHUB_STEP_SUMMARY"
